<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Choose the Correct Flower</title>

  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito&display=swap" rel="stylesheet">

  <style>
    .option-card {
      background: rgba(255, 255, 255, 0.85);
      margin: 1rem;
      padding: 1.5rem;
      border-radius: 20px;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
      width: 200px;
      transition: transform 0.2s;
      cursor: pointer;
      display: inline-block;
      text-decoration: none;
      color: inherit;
    }

    .option-card:hover {
      transform: scale(1.1) rotate(-3deg);
    }

    .gallery {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      padding: 1rem;
    }

    .flower {
      font-size: 3rem;
    }

    .back {
      margin-top: 2rem;
    }

    .back a {
      text-decoration: none;
      color: #6B4F4F;
      font-weight: bold;
    }
  </style>
</head>

<body>

<header>
  <h1>🌹 Pick the Correct Flower 🌹</h1>
  <p>Choose wisely 💭</p>
</header>

<!-- Interactive Choice Options -->
<section class="gallery">
  <!-- Incorrect Choice -->
  <a href="bears.html" class="option-card">
    <div class="flower">🌸</div>
    <p>Cherry Blossom</p>
  </a>

  <!-- Correct Choice -->
  <a href="success.html" class="option-card">
    <div class="flower">🌹</div>
    <p>Rose</p>
  </a>

  <!-- Incorrect Choice -->
  <a href="bears.html" class="option-card">
    <div class="flower">🌷</div>
    <p>Tulip</p>
  </a>
</section>

<div class="back">
  <a href="index.html">⬅ Back to Home</a>
</div>

</body>
</html>
